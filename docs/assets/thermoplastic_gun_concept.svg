<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <rect width="1100" height="520" fill="#f8fafc"/>
  <text x="40" y="45" font-size="28" font-family="Arial" font-weight="700" fill="#111827">Next-Generation Rotary Bell / Dual-Disc Thermoplastic Paint Gun — Concept Diagram</text>
  <rect x="70" y="170" width="190" height="80" rx="18" fill="#fee2e2" stroke="#991b1b" stroke-width="3"/>
  <text x="94" y="205" font-size="18" font-family="Arial" fill="#111827">Hot Paint Inlet</text>
  <text x="105" y="232" font-size="15" font-family="Arial" fill="#374151">200–220°C</text>
  <line x1="260" y1="210" x2="390" y2="210" stroke="#991b1b" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="390" y="95" width="330" height="230" rx="32" fill="#e0f2fe" stroke="#075985" stroke-width="3"/>
  <text x="425" y="130" font-size="20" font-family="Arial" font-weight="700" fill="#0f172a">Induction-Heated Gun Body</text>
  <ellipse cx="545" cy="215" rx="105" ry="58" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="3"/>
  <ellipse cx="585" cy="215" rx="105" ry="58" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="455" y="220" font-size="18" font-family="Arial" fill="#111827">Dual Disc / Bell Region</text>
  <path d="M500 235 C540 285 620 285 665 235" fill="none" stroke="#f59e0b" stroke-width="6" marker-end="url(#arrow2)"/>
  <path d="M500 195 C540 145 620 145 665 195" fill="none" stroke="#f59e0b" stroke-width="6" marker-end="url(#arrow2)"/>
  <text x="430" y="295" font-size="15" font-family="Arial" fill="#334155">Circular flow guidance + centrifugal spreading</text>
  <rect x="420" y="350" width="270" height="55" rx="12" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="440" y="383" font-size="16" font-family="Arial" fill="#14532d">Induction coil maintains viscosity</text>
  <line x1="555" y1="325" x2="555" y2="350" stroke="#166534" stroke-width="3"/>
  <rect x="760" y="105" width="250" height="70" rx="15" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="782" y="145" font-size="17" font-family="Arial" fill="#111827">Compressed Air Stabilization</text>
  <line x1="760" y1="140" x2="695" y2="190" stroke="#6d28d9" stroke-width="5" marker-end="url(#arrow3)"/>
  <rect x="765" y="245" width="245" height="75" rx="15" fill="#fef3c7" stroke="#92400e" stroke-width="3"/>
  <text x="790" y="277" font-size="17" font-family="Arial" fill="#111827">Automatic Internal Cleaning</text>
  <text x="805" y="302" font-size="14" font-family="Arial" fill="#374151">air line + controlled cleaning fluid</text>
  <line x1="765" y1="280" x2="705" y2="245" stroke="#92400e" stroke-width="5" marker-end="url(#arrow4)"/>
  <path d="M650 235 C720 270 765 315 800 390" fill="none" stroke="#111827" stroke-width="3" stroke-dasharray="8 6"/>
  <path d="M510 235 C450 280 410 320 370 390" fill="none" stroke="#111827" stroke-width="3" stroke-dasharray="8 6"/>
  <rect x="365" y="400" width="440" height="38" rx="8" fill="#111827"/>
  <text x="495" y="424" font-size="16" font-family="Arial" fill="#ffffff">Controlled wide flow pattern on road surface</text>
  <text x="65" y="470" font-size="14" font-family="Arial" fill="#475569">Engineering note: conceptual functional diagram, not a final manufacturing drawing.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#991b1b"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#6d28d9"/></marker>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#92400e"/></marker>
  </defs>
</svg>
